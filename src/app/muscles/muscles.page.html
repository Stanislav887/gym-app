<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>

    <ion-title>Muscle Groups</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-card *ngFor="let m of muscles" (click)="goTo(m.route)">
    <ion-card-header>
      <ion-card-title>{{ m.name }}</ion-card-title>
    </ion-card-header>
  </ion-card>

</ion-content>
